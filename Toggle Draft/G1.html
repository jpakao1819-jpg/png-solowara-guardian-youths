<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="G1.css">
</head>
<body>
    <div class="menu">
        <div class="toggle">
            <img src="Company_Logo-removebg-preview.png" alt="Company Logo" class="logo-img">
        </div> 
        <ul>
            <li style="--i: 0; --clr: #1877f2">
                <a href="https://www.facebook.com/liklikmedia" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>
            </li>
            <li style="--i: 0.5; --clr: #FF0050">
                <a href="https://www.tiktok.com/@liklik.drama" target="_blank" rel="noopener noreferrer"><i class="fab fa-tiktok"></i></a>
            </li>
        </ul>
    </div>
<script>
        const menu = document.querySelector('.menu');
        const toggle = document.querySelector('.toggle');
        
        // Set initial position
        menu.style.left = '50px';
        menu.style.top = '50px';
        
        // Make menu draggable
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let initialLeft = 0;
        let initialTop = 0;
        
        toggle.addEventListener('mousedown', function(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = menu.offsetLeft;
            initialTop = menu.offsetTop;
            menu.style.cursor = 'grabbing';
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            menu.style.left = (initialLeft + dx) + 'px';
            menu.style.top = (initialTop + dy) + 'px';
        });
        
        document.addEventListener('mouseup', function(e) {
            if (isDragging) {
                isDragging = false;
                menu.style.cursor = 'grab';
            }
        });
        
        // Double click to open menu
        toggle.addEventListener('dblclick', function(e) {
            if (!isDragging) {
                menu.classList.add('active');
            }
        });
        
        // Single click to close menu
        toggle.addEventListener('click', function(e) {
            if (!isDragging && menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
