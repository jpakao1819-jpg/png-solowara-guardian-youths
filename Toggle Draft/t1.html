<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1</title>
</head>
<body>
    <h1>T1</h1>
    <label for="pwd">Password:</label>
    <Legend>
    <input 
    type="checkbox" 
    id="pwd" 
    placeholder="Password">
    <input
    type="checkbox"
    onclick="pwd. 
    type = this.checked ? 'text' : 'password'">
    <button>Submit</button>
    </Legend>
</body>
</html>
