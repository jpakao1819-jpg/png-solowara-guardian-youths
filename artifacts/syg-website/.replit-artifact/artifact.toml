kind = "web"
previewPath = "/"
title = "Solwara Youth Guardian"
version = "1.0.0"
id = "artifacts/syg-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21807

[services.development]
run = "pnpm --filter @workspace/syg-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syg-website", "run", "build" ]
publicDir = "artifacts/syg-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21807"
BASE_PATH = "/"
